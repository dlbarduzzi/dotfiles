## Theme
include tokyonight-moon.conf

## Font
#font_size 17
font_size 20 
 
## Font styles
#font_family      family='CaskaydiaCove Nerd Font Mono' postscript_name=CaskaydiaCoveNFM-Regular
font_family      family='CaskaydiaCove Nerd Font Mono' postscript_name=CaskaydiaCoveNFM-Light
#bold_font        family='CaskaydiaCove Nerd Font Mono' style=Regular
bold_font        family='CaskaydiaCove Nerd Font Mono' style=Light
italic_font      auto
#bold_italic_font family='CaskaydiaCove Nerd Font Mono' style=Italic
bold_italic_font family='CaskaydiaCove Nerd Font Mono' style=LightItalic

## Line height
modify_font cell_height 9px

## Tabs
tab_bar_edge top
#tab_bar_style powerline
tab_bar_min_tabs 2
#tab_powerline_style slanted

## MacOS
macos_quit_when_last_window_closed yes

## Others
copy_on_select clipboard
